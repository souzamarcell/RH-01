<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <title>GráficosNet RH | Gestão de Pessoas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ======================================================================
   GráficosNet RH — CSS
   Token system, layout primitives, components, responsive rules.
====================================================================== */
      :root {
        --ink-900: #141a28;
        --ink-800: #1b2540;
        --ink-700: #26325a;
        --amber-500: #c99a2e;
        --amber-400: #ddb24c;
        --amber-100: #f6e9c9;
        --success: #2f8f5b;
        --danger: #c4453b;
        --warning: #d98b2b;
        --info: #2c7bb0;

        --bg: #f1f2f5;
        --surface: #ffffff;
        --surface-2: #f7f8fa;
        --border: #e2e5ea;
        --text: #1b2130;
        --text-dim: #6b7280;
        --text-faint: #9aa1b0;
        --shadow-sm: 0 1px 2px rgba(20, 26, 40, 0.06);
        --shadow-md: 0 6px 20px rgba(20, 26, 40, 0.1);
        --shadow-lg: 0 16px 40px rgba(20, 26, 40, 0.18);
        --radius: 10px;
        --radius-sm: 6px;
        --sidebar-w: 264px;
        --sidebar-w-collapsed: 76px;
        --topbar-h: 64px;
        --font-display: 'Sora', sans-serif;
        --font-body: 'Inter', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      }
      html[data-theme='dark'] {
        --bg: #0f131c;
        --surface: #181d28;
        --surface-2: #1f2531;
        --border: #2b3140;
        --text: #e7e9ee;
        --text-dim: #9aa1b0;
        --text-faint: #6b7280;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.55);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        transition:
          background var(--transition),
          color var(--transition);
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: var(--font-display);
        margin: 0;
        letter-spacing: -0.01em;
      }
      .mono {
        font-family: var(--font-mono);
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      input,
      select,
      textarea {
        font-family: inherit;
      }
      a {
        color: inherit;
      }
      ::selection {
        background: var(--amber-400);
        color: var(--ink-900);
      }
      .hidden {
        display: none !important;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      /* ---------- Login ---------- */
      #login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            circle at 15% 20%,
            rgba(201, 154, 46, 0.16),
            transparent 40%
          ),
          radial-gradient(
            circle at 85% 80%,
            rgba(38, 50, 90, 0.5),
            transparent 45%
          ),
          linear-gradient(
            160deg,
            var(--ink-900),
            var(--ink-800) 60%,
            var(--ink-700)
          );
        padding: 24px;
      }
      .login-card {
        width: 100%;
        max-width: 380px;
        background: var(--surface);
        border-radius: 16px;
        padding: 40px 36px 32px;
        box-shadow: var(--shadow-lg);
        position: relative;
        overflow: hidden;
      }
      .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--amber-500), var(--amber-400));
      }
      .login-logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: linear-gradient(140deg, var(--ink-800), var(--ink-700));
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 18px;
        box-shadow: var(--shadow-md);
      }
      .login-title {
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
      }
      .login-sub {
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 4px;
        margin-bottom: 28px;
      }
      .field {
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text-dim);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        padding: 11px 13px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface-2);
        color: var(--text);
        font-size: 14.5px;
        transition:
          border-color var(--transition),
          box-shadow var(--transition);
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        outline: none;
        border-color: var(--amber-500);
        box-shadow: 0 0 0 3px rgba(201, 154, 46, 0.18);
      }
      .field-error {
        color: var(--danger);
        font-size: 12px;
        margin-top: 4px;
        display: none;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 18px;
        border-radius: var(--radius-sm);
        border: 1.5px solid transparent;
        font-weight: 600;
        font-size: 14px;
        transition: all var(--transition);
        white-space: nowrap;
      }
      .btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .btn-primary {
        background: var(--ink-800);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--ink-700);
      }
      .btn-accent {
        background: var(--amber-500);
        color: var(--ink-900);
      }
      .btn-accent:hover {
        background: var(--amber-400);
      }
      .btn-ghost {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
      }
      .btn-ghost:hover {
        background: var(--surface-2);
      }
      .btn-danger {
        background: transparent;
        color: var(--danger);
        border-color: rgba(196, 69, 59, 0.4);
      }
      .btn-danger:hover {
        background: rgba(196, 69, 59, 0.1);
      }
      .btn-success {
        background: var(--success);
        color: #fff;
      }
      .btn-success:hover {
        filter: brightness(1.08);
      }
      .btn-block {
        width: 100%;
      }
      .btn-sm {
        padding: 7px 12px;
        font-size: 12.5px;
      }
      .btn-icon {
        padding: 8px;
        border-radius: var(--radius-sm);
      }
      .login-btn {
        margin-top: 6px;
        padding: 13px;
        font-size: 15px;
      }
      .login-error {
        background: rgba(196, 69, 59, 0.1);
        color: var(--danger);
        border: 1px solid rgba(196, 69, 59, 0.3);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
      .login-hint {
        margin-top: 22px;
        text-align: center;
        font-size: 11.5px;
        color: var(--text-faint);
      }

      /* ---------- App shell ---------- */
      #app-shell {
        display: none;
        min-height: 100vh;
      }
      #app-shell.active {
        display: flex;
      }
      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        background: var(--ink-900);
        color: #edeff4;
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 200;
        transition:
          width var(--transition),
          transform var(--transition);
      }
      .sidebar.collapsed {
        width: var(--sidebar-w-collapsed);
      }
      .sidebar-head {
        height: var(--topbar-h);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        flex-shrink: 0;
      }
      .sidebar-head .mark {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: linear-gradient(140deg, var(--amber-500), var(--amber-400));
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--ink-900);
        font-family: var(--font-display);
        font-weight: 800;
      }
      .sidebar-head .brand {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 15.5px;
        white-space: nowrap;
        overflow: hidden;
        transition: opacity var(--transition);
      }
      .sidebar.collapsed .brand {
        opacity: 0;
        width: 0;
      }
      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 14px 10px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 2px;
        color: rgba(237, 239, 244, 0.72);
        font-size: 13.8px;
        font-weight: 500;
        position: relative;
        transition:
          background var(--transition),
          color var(--transition);
        white-space: nowrap;
        overflow: hidden;
      }
      .nav-item svg {
        width: 19px;
        height: 19px;
        flex-shrink: 0;
      }
      .nav-item span {
        overflow: hidden;
        text-overflow: ellipsis;
        transition: opacity var(--transition);
      }
      .sidebar.collapsed .nav-item span {
        opacity: 0;
        width: 0;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
      }
      .nav-item.active {
        background: rgba(201, 154, 46, 0.14);
        color: var(--amber-400);
      }
      .nav-item.active::before {
        content: '';
        position: absolute;
        left: -10px;
        top: 6px;
        bottom: 6px;
        width: 3px;
        border-radius: 3px;
        background: var(--amber-500);
      }
      .nav-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        margin: 10px 4px;
      }
      .sidebar-foot {
        padding: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .collapse-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 9px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        color: rgba(237, 239, 244, 0.7);
        font-size: 12.5px;
      }
      .collapse-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 12, 18, 0.55);
        z-index: 190;
      }
      .sidebar-overlay.active {
        display: block;
      }

      .main-area {
        flex: 1;
        margin-left: var(--sidebar-w);
        transition: margin-left var(--transition);
        min-width: 0;
      }
      .sidebar.collapsed ~ .main-area {
        margin-left: var(--sidebar-w-collapsed);
      }
      .topbar {
        height: var(--topbar-h);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 22px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .hamburger {
        display: none;
        background: none;
        border: none;
        padding: 8px;
        border-radius: 8px;
        color: var(--text);
      }
      .hamburger:hover {
        background: var(--surface-2);
      }
      .hamburger svg {
        width: 22px;
        height: 22px;
      }
      .breadcrumb {
        font-size: 13px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }
      .breadcrumb strong {
        color: var(--text);
        font-weight: 600;
      }
      .topbar-search {
        flex: 1;
        max-width: 420px;
        position: relative;
      }
      .topbar-search input {
        width: 100%;
        padding: 9px 14px 9px 38px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font-size: 13.5px;
      }
      .topbar-search input:focus {
        outline: none;
        border-color: var(--amber-500);
      }
      .topbar-search svg {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--text-faint);
      }
      .search-results {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
        max-height: 320px;
        overflow-y: auto;
        display: none;
        z-index: 150;
      }
      .search-results.active {
        display: block;
      }
      .search-result-item {
        padding: 10px 14px;
        font-size: 13px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .search-result-item:last-child {
        border-bottom: none;
      }
      .search-result-item:hover {
        background: var(--surface-2);
        cursor: pointer;
      }
      .search-result-item .sr-name {
        font-weight: 600;
      }
      .search-result-item .sr-meta {
        color: var(--text-dim);
        font-size: 12px;
      }
      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
      }
      .icon-btn {
        width: 38px;
        height: 38px;
        border-radius: 9px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-dim);
        transition: all var(--transition);
      }
      .icon-btn:hover {
        background: var(--surface-2);
        color: var(--text);
      }
      .icon-btn svg {
        width: 18px;
        height: 18px;
      }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 6px 12px 6px 6px;
        border-radius: 22px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        position: relative;
      }
      .avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        font-family: var(--font-display);
      }
      .user-chip-name {
        font-size: 12.5px;
        font-weight: 600;
        line-height: 1.15;
      }
      .user-chip-role {
        font-size: 10.5px;
        color: var(--text-dim);
      }
      .user-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
        width: 180px;
        display: none;
        overflow: hidden;
        z-index: 150;
      }
      .user-menu.active {
        display: block;
      }
      .user-menu button {
        width: 100%;
        text-align: left;
        padding: 11px 14px;
        background: none;
        border: none;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 9px;
        color: var(--text);
      }
      .user-menu button:hover {
        background: var(--surface-2);
      }
      .user-menu button svg {
        width: 16px;
        height: 16px;
      }

      .page-content {
        padding: 24px;
        max-width: 1400px;
      }
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .page-title {
        font-size: 22px;
        font-weight: 700;
      }
      .page-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      /* ---------- Cards / grid ---------- */
      .grid-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 16px;
        margin-bottom: 22px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
      }
      .stat-card .stat-icon {
        width: 38px;
        height: 38px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
      }
      .stat-card .stat-icon svg {
        width: 19px;
        height: 19px;
        color: #fff;
      }
      .stat-card .stat-value {
        font-family: var(--font-display);
        font-size: 26px;
        font-weight: 700;
      }
      .stat-card .stat-label {
        font-size: 12.5px;
        color: var(--text-dim);
        margin-top: 2px;
      }
      .dash-row {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 18px;
        margin-bottom: 20px;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow-sm);
      }
      .panel h3 {
        font-size: 15px;
        margin-bottom: 14px;
      }
      .chart-bars {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        height: 180px;
        padding-top: 10px;
      }
      .chart-bar-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        justify-content: flex-end;
        height: 100%;
      }
      .chart-bar {
        width: 100%;
        max-width: 34px;
        border-radius: 6px 6px 0 0;
        background: linear-gradient(180deg, var(--amber-400), var(--amber-500));
        transition: height 0.4s ease;
      }
      .chart-bar-label {
        font-size: 11px;
        color: var(--text-dim);
      }
      .movement-item {
        display: flex;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .movement-item:last-child {
        border-bottom: none;
      }
      .movement-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-top: 5px;
        flex-shrink: 0;
      }
      .movement-title {
        font-weight: 600;
      }
      .movement-meta {
        color: var(--text-dim);
        font-size: 11.5px;
      }
      .notice {
        display: flex;
        gap: 10px;
        padding: 11px 13px;
        border-radius: 8px;
        background: rgba(217, 139, 43, 0.1);
        border: 1px solid rgba(217, 139, 43, 0.3);
        font-size: 12.8px;
        margin-bottom: 10px;
      }
      .notice svg {
        width: 17px;
        height: 17px;
        color: var(--warning);
        flex-shrink: 0;
      }

      /* ---------- Table ---------- */
      .table-toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .table-search {
        position: relative;
        flex: 1;
        min-width: 180px;
        max-width: 320px;
      }
      .table-search input {
        width: 100%;
        padding: 9px 12px 9px 34px;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border);
        background: var(--surface);
        font-size: 13px;
        color: var(--text);
      }
      .table-search svg {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        width: 15px;
        height: 15px;
        color: var(--text-faint);
      }
      .table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .table-scroll {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 640px;
      }
      thead th {
        text-align: left;
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-dim);
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-2);
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
      }
      thead th:hover {
        color: var(--text);
      }
      thead th .sort-arrow {
        font-size: 10px;
        margin-left: 4px;
        opacity: 0.6;
      }
      tbody td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 13.3px;
        vertical-align: middle;
      }
      tbody tr:last-child td {

    <script>
      /* ======================================================================
   GráficosNet RH — JAVASCRIPT
   Data layer, auth, router, UI components, page renderers.
====================================================================== */

      /* ---------------------------------------------------------------------
   1. DATA LAYER (LocalStorage)
--------------------------------------------------------------------- */
      const LS_PREFIX = 'GráficosNetRH_'
      const COLLECTIONS = [
        'usuarios',
        'funcionarios',
        'departamentos',
        'cargos',
        'setores',
        'equipamentos',
        'ticketsEntrega',
        'ticketsDevolucao',
        'beneficios',
        'ferias',
        'treinamentos',
        'auditoria',
        'configuracoes',
      ]

      function dbKey(name) {
        return LS_PREFIX + name
      }
      function dbGet(name) {
        try {
          const raw = localStorage.getItem(dbKey(name))
          return raw ? JSON.parse(raw) : null
        } catch (e) {
          console.error('Erro ao ler', name, e)
          return null
        }
      }
      function dbSet(name, value) {
        try {
          localStorage.setItem(dbKey(name), JSON.stringify(value))
          return true
        } catch (e) {
          console.error('Erro ao salvar', name, e)
          toast(
            'Erro ao salvar dados. Armazenamento pode estar cheio.',
            'error'
          )
          return false
        }
      }
      function uid(prefix) {
        return (
          (prefix ? prefix + '-' : '') +
          Date.now().toString(36) +
          Math.random().toString(36).slice(2, 7)
        )
      }
      function nowISO() {
        return new Date().toISOString()
      }

      const BACKUP_DATA_URL =
        'backup-rh-dados-ficticios-2026-07-04T22-49-16.json'
      const BACKUP_DATA = window.BACKUP_DATA || null

      function clearAppStorage() {
        Object.keys(localStorage)
          .filter((key) => key.startsWith(LS_PREFIX))
          .forEach((key) => localStorage.removeItem(key))
      }

      function applyBackupData(backup) {
        if (!backup || typeof backup !== 'object') return false
        clearAppStorage()
        Object.keys(backup).forEach((key) => {
          if (key === '__meta') return
          if (key === 'configuracoes') {
            const cfg = backup[key] || {}
            dbSet('configuracoes', {
              nomeEmpresa: cfg.nomeEmpresa || 'GráficosNet RH',
              logo: cfg.logo || null,
              tema: cfg.tema || 'light',
              idioma: cfg.idioma || 'pt-BR',
            })
            return
          }
          dbSet(key, backup[key])
        })
        ensureBaseUsers()
        return true
      }

      async function restoreBackupData() {
        try {
          let backup = BACKUP_DATA
          if (!backup) {
            const response = await fetch(BACKUP_DATA_URL)
            if (!response.ok) throw new Error('Backup não encontrado')
            backup = await response.json()
          }
          if (applyBackupData(backup)) {
            return true
          }
          return false
        } catch (e) {
          console.error('Erro ao carregar backup', e)
          return false
        }
      }

      function ensureBaseUsers() {
        const usuarios = dbGet('usuarios') || []
        const novos = []
        if (
          !usuarios.some((u) => (u.usuario || '').toLowerCase() === 'admin')
        ) {
          novos.push({
            id: uid('usr'),
            usuario: 'admin',
            senha: '123',
            nome: 'Administrador do Sistema',
            perfil: 'Administrador',
            status: 'Ativo',
            criadoEm: nowISO(),
            criadoPor: 'sistema',
          })
        }
        if (
          !usuarios.some((u) => (u.usuario || '').toLowerCase() === 'rodrigo')
        ) {
          novos.push({
            id: uid('usr'),
            usuario: 'Rodrigo',
            senha: '123',
            nome: 'Rodrigo Martins',
            perfil: 'Administrador',
            status: 'Ativo',
            criadoEm: nowISO(),
            criadoPor: 'sistema',
          })
        }
        if (novos.length) {
          dbSet('usuarios', [...usuarios, ...novos])
        }
      }

      function seedDatabase() {
        ensureBaseUsers()
        if (dbGet('funcionarios') === null) dbSet('funcionarios', [])

      function fmtDate(iso) {
        if (!iso) return '—'
        const d = new Date(iso)
        if (isNaN(d)) return iso
        return d.toLocaleDateString('pt-BR')
      }
      function fmtDateTime(iso) {
        if (!iso) return '—'
        const d = new Date(iso)
        if (isNaN(d)) return iso
        return (
          d.toLocaleDateString('pt-BR') +
          ' ' +
          d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
        )
      }
      function fmtMoney(v) {
        const n = parseFloat(v)
        if (isNaN(n)) return '—'
        return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
      }
      function escapeHtml(str) {
        if (str === undefined || str === null) return ''
        return String(str).replace(
          /[&<>"']/g,
          (c) =>
            ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#39;',
            })[c]
        )
      }
      function maskCPF(v) {
        v = v.replace(/\D/g, '').slice(0, 11)
        return v
          .replace(/(\d{3})(\d)/, '$1.$2')
          .replace(/(\d{3})(\d)/, '$1.$2')
          .replace(/(\d{3})(\d{1,2})$/, '$1-$2')
      }
      function maskCEP(v) {
        v = v.replace(/\D/g, '').slice(0, 8)
        return v.replace(/(\d{5})(\d)/, '$1-$2')
      }
      function maskPhone(v) {
        v = v.replace(/\D/g, '').slice(0, 11)
        if (v.length > 10)
          return v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3')
        return v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3')
      }
      function initials(name) {
        if (!name) return '?'
        const p = name.trim().split(/\s+/)
        return (
          (p[0]?.[0] || '') + (p.length > 1 ? p[p.length - 1][0] : '')
        ).toUpperCase()
      }
      const AVATAR_COLORS = [
        '#1B2540',
        '#26325A',
        '#C99A2E',
        '#2F8F5B',
        '#C4453B',
        '#2C7BB0',
        '#8B5CF6',
        '#D98B2B',
      ]
      function avatarColor(str) {
        let h = 0
        for (let i = 0; i < (str || '').length; i++)
          h = str.charCodeAt(i) + ((h << 5) - h)
        return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length]
      }
      function downloadFile(filename, content, mime) {
        const blob = new Blob([content], {
          type: mime || 'application/octet-stream',
        })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = filename
        document.body.appendChild(a)
        a.click()
        document.body.removeChild(a)
        URL.revokeObjectURL(url)
      }
      function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
          const r = new FileReader()
          r.onload = () => resolve(r.result)
          r.onerror = reject
          r.readAsDataURL(file)
        })
      }
      function toCSV(rows, columns) {
        const header = columns
          .map((c) => `"${c.label.replace(/"/g, '""')}"`)
          .join(';')
        const lines = rows.map((row) =>
          columns
            .map((c) => {
              let v = typeof c.value === 'function' ? c.value(row) : row[c.key]
              v = v === undefined || v === null ? '' : String(v)
              return `"${v.replace(/"/g, '""')}"`
            })
            .join(';')
        )
        return header + '\n' + lines.join('\n')
      }

      /* ---------------------------------------------------------------------

--------------------------------------------------------------------- */
      function toast(message, type) {
        type = type || 'info'
        const root = document.getElementById('toast-root')
        const el = document.createElement('div')
        el.className = 'toast ' + type
        const iconName =
          type === 'success'
            ? 'check'
            : type === 'error'
              ? 'x'
              : type === 'warning'
                ? 'info'
                : 'info'
        el.innerHTML = icon(iconName) + `<span>${escapeHtml(message)}</span>`
        root.appendChild(el)
        setTimeout(() => {
          el.style.transition = 'opacity .3s'
          el.style.opacity = '0'
          setTimeout(() => el.remove(), 300)
        }, 3800)
      }

      const SESSION_KEY = LS_PREFIX + 'session'
      const INACTIVITY_LIMIT_MS = 15 * 60 * 1000

      function attemptLogin(usuario, senha) {
        const usuarios = dbGet('usuarios') || []
        const found = usuarios.find(
          (u) =>
            u.usuario.toLowerCase() === usuario.toLowerCase() &&
            u.senha === senha
        )
        if (!found) {
          return null
        }
        if (found.status === 'Inativo') {
          return 'inativo'
        }
        return found
      }
      document
        .getElementById('login-form')
        .addEventListener('submit', function (e) {
          e.preventDefault()
          const u = document.getElementById('login-user').value.trim()
          const p = document.getElementById('login-pass').value
          const errBox = document.getElementById('login-error')
          const result = attemptLogin(u, p)
          if (result === null) {
            errBox.textContent = 'Usuário ou senha inválidos.'
            errBox.style.display = 'block'
            return
          }
          if (result === 'inativo') {
            errBox.textContent =
              'Este usuário está inativo. Contate o administrador.'
            errBox.style.display = 'block'
            return
          }
          errBox.style.display = 'none'
          sessionStorage.setItem(
            SESSION_KEY,
            JSON.stringify({ userId: result.id, loginAt: Date.now() })
          )
          state.currentUser = result
          logAudit('Login', 'Autenticação')
          enterApp()
        })

      function enterApp() {
        document.getElementById('login-screen').style.display = 'none'
        document.getElementById('app-shell').classList.add('active')

      function doLogout(silent) {
        if (!silent) logAudit('Logout', 'Autenticação')
        sessionStorage.removeItem(SESSION_KEY)
        state.currentUser = null
        document.getElementById('app-shell').classList.remove('active')
        document.getElementById('login-screen').style.display = 'flex'
        document.getElementById('login-user').value = ''
        document.getElementById('login-pass').value = ''
        document.getElementById('login-error').style.display = 'none'
        clearTimeout(state.inactivityTimer)
      }
      function checkExistingSession() {
        const raw = sessionStorage.getItem(SESSION_KEY)
        if (!raw) return false
        try {
          const sess = JSON.parse(raw)
          const usuarios = dbGet('usuarios') || []
          const user = usuarios.find((u) => u.id === sess.userId)
          if (!user || user.status === 'Inativo') return false
          state.currentUser = user
          return true
        } catch (e) {
          return false
        }
      }
      ;['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(
        (ev) => {
          document.addEventListener(
            ev,
            () => {
              if (state.currentUser) resetInactivityTimer()

            { passive: true }
          )
        }
      )
      function resetInactivityTimer() {
        clearTimeout(state.inactivityTimer)
        state.inactivityTimer = setTimeout(() => {
          toast('Sessão encerrada por inatividade.', 'warning')
          doLogout()
        }, INACTIVITY_LIMIT_MS)

      /**
       * renderDataTable: builds a searchable, sortable, paginated table.
       * config: {containerId, columns:[{key,label,sortable,render(row)}], data, rowActions(row), pageSize, emptyMsg}
       */
      const tableStates = {}
      function renderDataTable(containerId, config) {
        if (!tableStates[containerId])
          tableStates[containerId] = {
            search: '',
            sortKey: null,
            sortDir: 1,
            page: 1,
          }
        const st = tableStates[containerId]
        const pageSize = config.pageSize || 8

        let rows = config.data.slice()
        if (st.search) {
          const q = st.search.toLowerCase()
          rows = rows.filter((r) =>
            config.columns.some((c) => {
              const v = c.searchValue
                ? c.searchValue(r)
                : c.render
                  ? ''
                  : r[c.key]
              return String(v || '')
                .toLowerCase()
                .includes(q)
            })
          )
        }
        if (st.sortKey) {
          rows.sort((a, b) => {
            let av = a[st.sortKey],
              bv = b[st.sortKey]
            av = av === undefined ? '' : av
            bv = bv === undefined ? '' : bv
            if (typeof av === 'string') return av.localeCompare(bv) * st.sortDir
            return (av > bv ? 1 : av < bv ? -1 : 0) * st.sortDir
          })
        }
        const total = rows.length
        const totalPages = Math.max(1, Math.ceil(total / pageSize))
        if (st.page > totalPages) st.page = totalPages
        const pageRows = rows.slice(
          (st.page - 1) * pageSize,
          st.page * pageSize
        )

        const container = document.getElementById(containerId)
        const headHtml =
          config.columns
            .map((c) => {
              const arrow =
                st.sortKey === c.key ? (st.sortDir === 1 ? '▲' : '▼') : ''
              return `<th data-key="${c.key}" data-sortable="${c.sortable !== false}">${c.label}${c.sortable !== false ? `<span class="sort-arrow">${arrow}</span>` : ''}</th>`
            })
            .join('') + (config.rowActions ? '<th>Ações</th>' : '')

        const bodyHtml = pageRows.length
          ? pageRows
              .map((row) => {
                const tds = config.columns
                  .map(
                    (c) =>
                      `<td>${c.render ? c.render(row) : escapeHtml(row[c.key])}</td>`
                  )
                  .join('')
                const actions = config.rowActions
                  ? `<td><div class="td-actions">${config.rowActions(row)}</div></td>`
                  : ''
                return `<tr>${tds}${actions}</tr>`
              })
              .join('')
          : ''

        container.innerHTML = `
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>${headHtml}</tr></thead>
          <tbody>${bodyHtml}</tbody>
        </table>
      </div>
      ${!pageRows.length ? `<div class="empty-state">${icon('search')}<p>${config.emptyMsg || 'Nenhum registro encontrado.'}</p></div>` : ''}
      <div class="pagination">
        <span>${total} registro${total !== 1 ? 's' : ''} · página ${st.page} de ${totalPages}</span>
        <div class="pg-btns">
          <button class="pg-btn" data-pg="prev" ${st.page <= 1 ? 'disabled' : ''}>‹</button>
          <button class="pg-btn" data-pg="next" ${st.page >= totalPages ? 'disabled' : ''}>›</button>
        </div>
      </div>
    </div>`

        container.querySelectorAll('th[data-sortable="true"]').forEach((th) => {
          th.onclick = () => {
            const key = th.dataset.key
            if (st.sortKey === key) st.sortDir *= -1
            else {
              st.sortKey = key
              st.sortDir = 1
            }
            renderDataTable(containerId, config)
          }
        })
        container.querySelector('[data-pg="prev"]').onclick = () => {
          st.page--
          renderDataTable(containerId, config)
        }
        container.querySelector('[data-pg="next"]').onclick = () => {
          st.page++
          renderDataTable(containerId, config)
        }
      }
      function wireTableSearch(inputId, containerId, config) {
        document.getElementById(inputId).addEventListener('input', function () {
          tableStates[containerId] = tableStates[containerId] || { page: 1 }
          tableStates[containerId].search = this.value
          tableStates[containerId].page = 1
          renderDataTable(containerId, config)
        })
      }

      function initDashboardCharts() {

          d.setMonth(d.getMonth() - i)
          months.push({
            key: d.toISOString().slice(0, 7),

        }
        const counts = months.map(
          (m) =>
            func.filter((f) => f.admissao && f.admissao.slice(0, 7) === m.key)
              .length
        )
        const max = Math.max(...counts, 1)
        const wrap = document.getElementById('chart-admissoes')
        if (!wrap) return
        wrap.innerHTML = months
          .map(
            (m, i) => `
    <div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${Math.max((counts[i] / max) * 140, 4)}px" title="${counts[i]}"></div>
      <div class="chart-bar-label">${m.label}</div>
    </div>`
          )
          .join('')
      }

      function drawQrPlaceholder(canvas, text) {
        // Deterministic pseudo-QR visual pattern generated from the ticket text.
        // Note: this is a decorative code, not a scannable ISO/IEC 18004 QR code
        // (no external library is used, per the project's "no external libraries" requirement).
        const ctx = canvas.getContext('2d')
        const size = canvas.width,
          cells = 21,
          cell = size / cells
        ctx.fillStyle = '#fff'
        ctx.fillRect(0, 0, size, size)
        let seed = 0
        for (let i = 0; i < text.length; i++)
          seed = (seed * 31 + text.charCodeAt(i)) >>> 0
        function rand() {
          seed = (seed * 1664525 + 1013904223) >>> 0
          return seed / 4294967295
        }
        ctx.fillStyle = '#141A28'
        for (let y = 0; y < cells; y++) {
          for (let x = 0; x < cells; x++) {
            const isFinder =
              (x < 7 && y < 7) ||
              (x > cells - 8 && y < 7) ||
              (x < 7 && y > cells - 8)
            if (isFinder) continue
            if (rand() > 0.55) ctx.fillRect(x * cell, y * cell, cell, cell)
          }
        }
        function finder(px, py) {
          ctx.fillStyle = '#141A28'
          ctx.fillRect(px * cell, py * cell, 7 * cell, 7 * cell)
          ctx.fillStyle = '#fff'
          ctx.fillRect((px + 1) * cell, (py + 1) * cell, 5 * cell, 5 * cell)
          ctx.fillStyle = '#141A28'
          ctx.fillRect((px + 2) * cell, (py + 2) * cell, 3 * cell, 3 * cell)
        }
        finder(0, 0)
        finder(cells - 7, 0)
        finder(0, cells - 7)
      }

      function openTicketForm(tipo) {
        const funcionarios = dbGet('funcionarios') || []
        const equipamentos = dbGet('equipamentos') || []
        openModal({
          title:
            tipo === 'entrega'
              ? 'Novo Ticket de Entrega'
              : 'Novo Ticket de Devolução',
          bodyHtml: `<div class="form-grid">
      <div class="field"><label>Funcionário</label><select id="tk-func"><option value="">—</option>${funcionarios.map((f) => `<option value="${f.id}">${escapeHtml(f.nome)}</option>`).join('')}</select></div>
      <div class="field"><label>Equipamento</label><select id="tk-equip"><option value="">—</option>${equipamentos.map((e) => `<option value="${e.id}">${escapeHtml(e.descricao || e.tipo)} ${e.patrimonio ? '(' + escapeHtml(e.patrimonio) + ')' : ''}</option>`).join('')}</select></div>
      <div class="field"><label>Patrimônio</label><input type="text" id="tk-pat"></div>
      <div class="field"><label>Número de série</label><input type="text" id="tk-serie"></div>
      <div class="field"><label>Responsável pela entrega</label><input type="text" id="tk-resp" value="${escapeHtml(state.currentUser?.nome || '')}"></div>
      <div class="field"><label>Data</label><input type="date" id="tk-data" value="${new Date().toISOString().slice(0, 10)}"></div>
      <div class="field span-2"><label>Observações</label><textarea id="tk-obs" rows="2"></textarea></div>
    </div>`,
          footHtml: `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-accent" id="tk-save">${icon('check')}Gerar Ticket</button>`,
        })
        document.getElementById('tk-save').onclick = () => {
          const funcId = document.getElementById('tk-func').value
          const equipId = document.getElementById('tk-equip').value
          if (!funcId || !equipId) {
            toast('Selecione o funcionário e o equipamento.', 'error')
            return
          }
          const equip = equipamentos.find((e) => e.id === equipId)
          const collectionKey =
            tipo === 'entrega' ? 'ticketsEntrega' : 'ticketsDevolucao'
          const list = dbGet(collectionKey) || []
          const numero =
            (tipo === 'entrega' ? 'ENT-' : 'DEV-') +
            Date.now().toString().slice(-8)
          const record = {
            id: uid('tkt'),
            numero,
            funcionarioId: funcId,
            equipamentoId: equipId,
            equipamentoDesc: equip ? equip.descricao || equip.tipo : '—',
            patrimonio:
              document.getElementById('tk-pat').value ||
              (equip ? equip.patrimonio : ''),
            numeroSerie:
              document.getElementById('tk-serie').value ||
              (equip ? equip.numeroSerie : ''),
            responsavel: document.getElementById('tk-resp').value,
            data: document.getElementById('tk-data').value,
            hora: new Date().toLocaleTimeString('pt-BR'),
            observacoes: document.getElementById('tk-obs').value,
            criadoEm: nowISO(),
          }
          list.push(record)
          dbSet(collectionKey, list)
          // update equipment status
          const equipList = dbGet('equipamentos') || []
          const eq = equipList.find((e) => e.id === equipId)
          if (eq) {
            eq.status = tipo === 'entrega' ? 'Emprestado' : 'Disponível'
            eq.funcionarioId = tipo === 'entrega' ? funcId : ''
            dbSet('equipamentos', equipList)
          }
          logAudit(
            'Inclusão',
            tipo === 'entrega' ? 'Ticket de Entrega' : 'Ticket de Devolução',
            numero
          )
          closeModal()
          toast('Ticket gerado com sucesso.', 'success')
          initTicketsPage()
          viewTicket(tipo, record.id)
        }
      }
      function viewTicket(tipo, id) {
        const collectionKey =
          tipo === 'entrega' ? 'ticketsEntrega' : 'ticketsDevolucao'
        const t = (dbGet(collectionKey) || []).find((x) => x.id === id)

        const func =

        const cfg = dbGet('configuracoes') || {}
        openModal({
          title: `Ticket de ${tipo === 'entrega' ? 'Entrega' : 'Devolução'}`,
          bodyHtml: `
      <div class="ticket-doc" id="ticket-print-area">
        <div class="ticket-doc-head">
          <div><h3 style="font-size:16px;">${escapeHtml(cfg.nomeEmpresa || 'GráficosNet RH')}</h3><div class="mono" style="font-size:13px;color:var(--text-dim);">${escapeHtml(t.numero)}</div></div>

        </div>
        <div class="ticket-grid">
          <div><span>Funcionário</span>${escapeHtml(func.nome || '—')}</div>
          <div><span>Matrícula</span>${escapeHtml(func.matricula || '—')}</div>
          <div><span>Equipamento</span>${escapeHtml(t.equipamentoDesc)}</div>
          <div><span>Patrimônio</span>${escapeHtml(t.patrimonio || '—')}</div>

        <div class="ticket-sign">Assinatura: ______________________________________________</div>
      </div>
    `,
          footHtml: `<button class="btn btn-ghost" onclick="closeModal()">Fechar</button><button class="btn btn-accent" onclick="window.print()">${icon('print')}Exportar / Imprimir PDF</button>`,
          onOpen: () => {

        .map(

        <div class="panel">
          <h3>${def.label}</h3>
          <p style="font-size:12.5px;color:var(--text-dim);margin:6px 0 14px;">${reportData(key).length} registro(s) disponíveis para exportação.</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">

            <button class="btn btn-ghost btn-sm" onclick="exportReport('${key}','json')">${icon('json')}JSON</button>

          </div>

        )

      function exportReport(key, format) {
        const def = REPORT_DEFS[key]
        const data = reportData(key)
        const columns = def.cols.map((c) => ({
          label: c.label,
          key: c.key,
          value: c.value,
        }))
        const stamp = new Date().toISOString().replace(/[:.]/g, '-')
        if (format === 'csv') {
          downloadFile(
            `relatorio-${key}-${stamp}.csv`,
            toCSV(data, columns),
            'text/csv;charset=utf-8;'
          )
        } else {
          downloadFile(
            `relatorio-${key}-${stamp}.json`,
            JSON.stringify(data, null, 2),
            'application/json'
          )
        }
        logAudit(
          'Exportação',
          'Relatórios',
          `${def.label} (${format.toUpperCase()})`
        )
        toast(
          `Relatório de ${def.label} exportado em ${format.toUpperCase()}.`,
          'success'
        )
      }
      function printReport(key) {
        const def = REPORT_DEFS[key]
        const data = reportData(key)
        const html = `<h2>${def.label}</h2><table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;font-family:sans-serif;font-size:12px;">
    <thead><tr>${def.cols.map((c) => `<th>${c.label}</th>`).join('')}</tr></thead>
    <tbody>${data.map((r) => `<tr>${def.cols.map((c) => `<td>${escapeHtml(c.value ? c.value(r) : r[c.key])}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`
        const win = window.open('', '_blank')
        win.document.write(
          `<html><head><title>${def.label}</title></head><body>${html}</body></html>`
        )
        win.document.close()
        win.focus()
        win.print()
        logAudit('Exportação', 'Relatórios', `${def.label} (PDF/Impressão)`)
      }

      function renderRestaurarPage() {
        return `
    <div class="page-header"><div><h1 class="page-title">Restaurar Backup</h1></div></div>
    <div class="panel" style="max-width:600px;">
      <h3>Restaurar a partir de um arquivo</h3>
      <p style="font-size:13.3px;color:var(--text-dim);margin:10px 0 18px;line-height:1.5;">
        Selecione um arquivo JSON gerado pelo módulo de Backup. Os dados atuais serão substituídos após confirmação.
      </p>
      <label class="btn btn-accent" style="cursor:pointer;">${icon('upload')}Selecionar arquivo JSON<input type="file" id="restore-input" accept="application/json,.json" class="hidden"></label>
      <div id="restore-error" class="field-error" style="display:none;margin-top:14px;"></div>
    </div>
  `

      function initRestaurarPage() {
        document
          .getElementById('restore-input')
          .addEventListener('change', function () {
            const file = this.files[0]
            const errBox = document.getElementById('restore-error')
            errBox.style.display = 'none'
            if (!file) {
              return
            }
            if (!file.name.toLowerCase().endsWith('.json')) {
              errBox.textContent =
                'Arquivo inválido: selecione um arquivo .json.'
              errBox.style.display = 'block'
              this.value = ''
              return
            }
            const reader = new FileReader()
            reader.onload = () => {
              let parsed
              try {
                parsed = JSON.parse(reader.result)
              } catch (e) {
                errBox.textContent =
                  'Arquivo inválido: o conteúdo não é um JSON válido.'
                errBox.style.display = 'block'
                return
              }
              const hasAnyCollection = COLLECTIONS.some(
                (c) =>
                  Array.isArray(parsed[c]) ||
                  (c === 'configuracoes' && typeof parsed[c] === 'object')
              )
              if (!hasAnyCollection) {
                errBox.textContent =
                  'Arquivo inválido: não contém dados reconhecíveis do sistema GráficosNet RH.'
                errBox.style.display = 'block'
                return
              }
              confirmDialog(
                'Restaurar este backup substituirá TODOS os dados atuais do sistema. Deseja continuar?',
                () => {
                  COLLECTIONS.forEach((c) => {
                    if (parsed[c] !== undefined) dbSet(c, parsed[c])
                  })
                  logAudit('Restauração', 'Restaurar Backup', file.name)
                  toast('Backup restaurado com sucesso.', 'success')
                  applyTheme()
                  applyCompanyBranding()
                  buildSidebar()
                  updateUserChip()
                  navigate('dashboard')
                },
                { danger: true, confirmLabel: 'Restaurar' }
              )
            }
            reader.readAsText(file)
          })
      }
